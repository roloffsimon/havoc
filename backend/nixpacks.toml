# WeasyPrint links against Pango/HarfBuzz/Fontconfig at runtime via cffi.
# The previous nixPkgs version put these in /nix/store/... where the
# default ld.so didn't find them. apt installs to /usr/lib/x86_64-linux-gnu,
# which is on the default LD_LIBRARY_PATH — much more reliable.
#
# fonts-dejavu-core gives us a baseline sans-serif font so fontconfig
# finds at least one match when the document doesn't pin a family.

[phases.setup]
nixPkgs = ["python3", "gcc"]
aptPkgs = [
  "libglib2.0-0",        # libgobject-2.0-0, libgio-2.0-0
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libharfbuzz0b",
  "libfontconfig1",
  "fonts-dejavu-core",
]
