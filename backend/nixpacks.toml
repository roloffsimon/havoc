# WeasyPrint links against Pango/HarfBuzz/Fontconfig at runtime via cffi.
# The previous nixPkgs version put these in /nix/store/... where the
# default ld.so didn't find them. apt installs to /usr/lib/x86_64-linux-gnu,
# which is on the default LD_LIBRARY_PATH — much more reliable.
#
# fonts-dejavu-core gives us a baseline sans-serif font so fontconfig
# finds at least one match when the document doesn't pin a family.

[phases.setup]
nixPkgs = ["python3", "gcc"]
aptPkgs = [
  "libglib2.0-0",        # libgobject-2.0-0, libgio-2.0-0
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libharfbuzz0b",
  "libfontconfig1",
  "fonts-dejavu-core",
]

# WeasyPrint 63 calls dlopen() with literal names like "libgobject-2.0-0"
# (no ".so" suffix). The loader doesn't transform those, so even though
# the apt-installed files are at /usr/lib/x86_64-linux-gnu/libgobject-
# 2.0.so.0 etc., the dlopen calls fail. Create the unsuffixed symlinks
# WeasyPrint expects.
#
# We do NOT run `ldconfig` here: apt's post-install trigger already
# refreshed /etc/ld.so.cache, and a second pass in this mixed Nix+apt
# image re-indexes Nix's libc and breaks the Nix-built python binary
# (it dies at startup with "__vdso_time: invalid mode for dlopen()").
[phases.install]
cmds = [
  "ln -sf /usr/lib/x86_64-linux-gnu/libgobject-2.0.so.0 /usr/lib/libgobject-2.0-0",
  "ln -sf /usr/lib/x86_64-linux-gnu/libpango-1.0.so.0    /usr/lib/libpango-1.0-0",
  "ln -sf /usr/lib/x86_64-linux-gnu/libpangoft2-1.0.so.0 /usr/lib/libpangoft2-1.0-0",
  "ln -sf /usr/lib/x86_64-linux-gnu/libharfbuzz.so.0     /usr/lib/libharfbuzz-0",
  "ln -sf /usr/lib/x86_64-linux-gnu/libfontconfig.so.1   /usr/lib/libfontconfig-1",
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
]
