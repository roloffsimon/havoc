# Railway deployment config
# ------------------------
# Assumes a mounted volume at /data so the pool survives deploys.
# Environment variables to set in Railway dashboard:
#   GFW_TOKEN                 Global Fishing Watch API bearer token
#   DATA_DIR                  /data
#   HAVOC_DAY_0               2026-02-13   (project start, shown as "day 1")
#   HAVOC_SCHEDULE_HOUR_UTC   14            (daily job fires at 14:15 UTC)
#   HAVOC_FALLBACK_JSON       (optional) path to a GFW dump used if the
#                             live API fails

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/api/health"
# The daily PDF render starves the event loop briefly while typst
# compiles. Measured runtime on 2026-05-05: 47s end-to-end. 120s gives
# ~2.5× headroom for heavier days while catching genuine hangs much
# faster than the previous 600s tolerance.
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
