# Railway deployment config
# ------------------------
# Assumes a mounted volume at /data so the pool survives deploys.
# Environment variables to set in Railway dashboard:
#   GFW_TOKEN                 Global Fishing Watch API bearer token
#   DATA_DIR                  /data
#   HAVOC_DAY_0               2026-02-13   (project start, shown as "day 1")
#   HAVOC_SCHEDULE_HOUR_UTC   14            (daily job fires at 14:15 UTC)
#   HAVOC_FALLBACK_JSON       (optional) path to a GFW dump used if the
#                             live API fails

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/api/health"
# The daily PDF render — a single Typst compile over thousands of
# vessels — is CPU-hot for ~1 minute and starves the event loop briefly,
# which can stall the healthcheck. 600s tolerance gives the render
# plenty of room without losing the safety net for genuine hangs.
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
